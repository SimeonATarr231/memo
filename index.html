<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memo — Personal Notes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-wrapper">
      <header class="site-header">
        <div class="header-left">
          <span class="site-label">MEMO</span>
          <span class="site-sublabel">Personal Notes</span>
        </div>
        <div class="header-right">
          <span class="note-count" id="noteCount">0 notes</span>
          <button
            class="theme-toggle"
            id="themeToggle"
            aria-label="Toggle theme"
          >
            ☾
          </button>
        </div>
      </header>

      <!-- COMPOSE AREA -->
      <div class="compose-area" id="composeArea">
        <input
          type="text"
          class="compose-title"
          id="composeTitle"
          placeholder="Note title..."
          maxlength="80"
          autocomplete="off"
        />
        <textarea
          class="compose-body"
          id="composeBody"
          placeholder="Write your note here..."
          rows="4"
          maxlength="1000"
        ></textarea>
        <div class="compose-footer">
          <div class="color-picker" id="colorPicker">
            <button
              class="color-dot is-active"
              data-color="yellow"
              aria-label="Yellow"
              style="--dot: #fff9c4"
            ></button>
            <button
              class="color-dot"
              data-color="blue"
              aria-label="Blue"
              style="--dot: #dbeafe"
            ></button>
            <button
              class="color-dot"
              data-color="pink"
              aria-label="Pink"
              style="--dot: #fce7f3"
            ></button>
            <button
              class="color-dot"
              data-color="green"
              aria-label="Green"
              style="--dot: #dcfce7"
            ></button>
          </div>
          <span class="char-count" id="charCount">0 / 1000</span>
          <button class="add-btn" id="addBtn">Add Note</button>
        </div>
      </div>

      <!-- SEARCH -->
      <div class="search-bar">
        <input
          type="text"
          class="search-input"
          id="searchInput"
          placeholder="Search notes..."
          autocomplete="off"
        />
        <span class="result-count" id="resultCount" hidden></span>
      </div>

      <!-- NOTES GRID -->
      <main class="main-content">
        <div class="notes-grid" id="notesGrid">
          <!-- Notes injected by JavaScript -->
        </div>
        <div class="empty-state" id="emptyState" hidden>
          <span class="empty-icon">✎</span>
          <span class="empty-text"
            >No notes yet. Write your first one above.</span
          >
        </div>
      </main>

      <footer class="site-footer">
        <div class="footer-left">
          <span class="footer-brand">MEMO</span>
          <span class="footer-meta">Personal Notes &mdash; v1.0</span>
          <span class="footer-legal"
            >&copy; 2025 Tarr. All rights reserved.</span
          >
        </div>
        <div class="footer-right">
          <span class="footer-credit">Designed &amp; Built by</span>
          <a
            class="footer-name"
            href="https://github.com/SimeonATarr231"
            target="_blank"
            rel="noopener noreferrer"
            >Simeon Aseon Tarr</a
          >
        </div>
      </footer>
    </div>

    <script src="script.js"></script>
  </body>
</html>
